name: continuous_integration

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check-and-test:
    name: Check, Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ipv7-core/target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('ipv7-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ci-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            build-essential \
            cmake \
            libmnl-dev

      - name: Rustfmt Check
        run: cargo fmt --manifest-path ipv7-core/Cargo.toml -- --check

      - name: Cargo Check
        run: cargo check --manifest-path ipv7-core/Cargo.toml

      - name: Clippy Lint
        run: cargo clippy --manifest-path ipv7-core/Cargo.toml -- -D warnings

      - name: Build Debug
        run: cargo build --manifest-path ipv7-core/Cargo.toml
