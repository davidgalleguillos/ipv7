name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            build-essential \
            cmake \
            libmnl-dev

      - name: Cargo Format
        run: cargo fmt --manifest-path ipv7-core/Cargo.toml -- --check

      - name: Cargo Check
        run: cargo check --manifest-path ipv7-core/Cargo.toml

      - name: Cargo Clippy
        run: cargo clippy --manifest-path ipv7-core/Cargo.toml -- -D warnings

      - name: Cargo Test
        run: cargo test --manifest-path ipv7-core/Cargo.toml
