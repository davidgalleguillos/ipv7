name: Release IPv7 Core

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ipv7-core-linux-amd64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ipv7-core-windows-amd64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ipv7-core-macos-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ipv7-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ipv7-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            build-essential \
            cmake \
            libmnl-dev

      - name: Build release binary
        run: cargo build --release --manifest-path ipv7-core/Cargo.toml --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p out
          cp ipv7-core/target/${{ matrix.target }}/release/ipv7-core out/${{ matrix.artifact_name }}
          chmod +x out/${{ matrix.artifact_name }}

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir out
          copy ipv7-core\target\${{ matrix.target }}\release\ipv7-core.exe out\${{ matrix.artifact_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.artifact_name }}
          generate_release_notes: true
